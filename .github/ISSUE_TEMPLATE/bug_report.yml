name: Bug Report
description: Report a bug in oRKLLM
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of oRKLLM is affected? (check the navbar chip or `cat /usr/lib/orkllm/package.json | grep version`)
      placeholder: "e.g. 0.6.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area is affected?
      options:
        - Admin Console (UI)
        - OIDC / SAML Authentication
        - Model loading / inference
        - API (/v1/chat/completions etc.)
        - Prefix cache
        - HuggingFace downloader
        - Installation / deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: false

  - type: input
    id: platform
    attributes:
      label: Platform
      description: SBC model and OS
      placeholder: "e.g. NanoPi M5 (RK3576), Armbian 24.x"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant server logs (`journalctl -u orkllm -n 50`)
      render: shell
    validations:
      required: false
