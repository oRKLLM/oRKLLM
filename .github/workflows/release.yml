name: Release

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run if CI passed
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Prepare ARM64 build context
        run: |
          mkdir -p arm64_deps
          cp package.json package-lock.json binding.gyp arm64_deps/
          cp -r src arm64_deps/src

      - name: Cache ARM64 compiled dependencies
        id: arm64-cache
        uses: actions/cache@v4
        with:
          path: |
            arm64_deps/node_modules
            arm64_deps/build
          key: arm64-deps-node22-${{ hashFiles('package-lock.json', 'binding.gyp', 'src/addon/**') }}

      - name: Set up QEMU
        if: steps.arm64-cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Compile ARM64 production dependencies
        if: steps.arm64-cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}/arm64_deps:/workspace" \
            -w /workspace \
            node:22-bookworm-slim \
            bash -c "
              apt-get update -q &&
              apt-get install -y -q python3 make g++ &&
              npm ci --omit=dev
            "
          sudo chown -R "$(id -u):$(id -g)" arm64_deps/node_modules arm64_deps/build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: npx semantic-release

      - name: Publish to APT repository
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          DEB=$(ls dist/*.deb 2>/dev/null | head -1)
          [ -z "$DEB" ] && { echo "No deb built — skipping APT publish"; exit 0; }

          sudo apt-get install -y -q dpkg-dev

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          git worktree add /tmp/apt-repo gh-pages

          bash scripts/update-apt-repo.sh "$DEB" /tmp/apt-repo

          cd /tmp/apt-repo
          git add .
          git diff --staged --quiet && { echo "No changes to APT repo"; exit 0; }
          git commit -m "chore: update APT repo for $(basename $DEB)"
          git push --force origin gh-pages
