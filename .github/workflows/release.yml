name: Release

on:
  push:
    branches:
      - main
      - beta
      - alpha

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Starts immediately in parallel with CI — does the slow work up front
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      arm64_cache_key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Compute ARM64 cache key
        id: cache-key
        run: echo "key=arm64-deps-node22-${{ hashFiles('package-lock.json', 'binding.gyp', 'src/addon/**') }}" >> "$GITHUB_OUTPUT"

      - name: Prepare ARM64 build context
        run: |
          mkdir -p arm64_deps
          cp package.json package-lock.json binding.gyp arm64_deps/
          cp -r src arm64_deps/src

      - name: Cache ARM64 compiled dependencies
        id: arm64-cache
        uses: actions/cache@v4
        with:
          path: |
            arm64_deps/node_modules
            arm64_deps/build
          key: ${{ steps.cache-key.outputs.key }}

      - name: Set up QEMU
        if: steps.arm64-cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Compile ARM64 production dependencies
        if: steps.arm64-cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}/arm64_deps:/workspace" \
            -w /workspace \
            node:22-bookworm-slim \
            bash -c "
              apt-get update -q &&
              apt-get install -y -q python3 make g++ &&
              npm ci --omit=dev
            "
          sudo chown -R "$(id -u):$(id -g)" arm64_deps/node_modules arm64_deps/build

  # Waits for both build AND CI to pass before releasing
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build  # ARM64 build must succeed

    steps:
      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          echo "Waiting for CI to complete on $SHA..."
          for i in $(seq 1 30); do
            STATUS=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
              --jq '[.check_runs[] | select(.name == "Test" or .name == "Security Scan")] |
                    if length == 0 then "pending"
                    elif all(.[]; .status == "completed") then
                      if all(.[]; .conclusion == "success") then "success" else "failure" end
                    else "pending" end' 2>/dev/null || echo "pending")
            echo "  attempt $i/30: $STATUS"
            if [ "$STATUS" = "success" ]; then
              echo "CI passed — proceeding with release"
              exit 0
            elif [ "$STATUS" = "failure" ]; then
              echo "CI failed — aborting release"
              exit 1
            fi
            sleep 20
          done
          echo "Timed out waiting for CI (10 min)"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Restore ARM64 compiled dependencies
        uses: actions/cache@v4
        with:
          path: |
            arm64_deps/node_modules
            arm64_deps/build
          key: arm64-deps-node22-${{ hashFiles('package-lock.json', 'binding.gyp', 'src/addon/**') }}

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: npx semantic-release

      - name: Publish to APT repository
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          DEB=$(ls dist/*.deb 2>/dev/null | head -1)
          [ -z "$DEB" ] && { echo "No deb built — skipping APT publish"; exit 0; }

          # Derive APT channel from the triggering branch
          case "${{ github.ref_name }}" in
            main)  CHANNEL=stable ;;
            beta)  CHANNEL=beta   ;;
            alpha) CHANNEL=alpha  ;;
            *)     CHANNEL=alpha  ;;
          esac
          echo "Publishing to APT channel: $CHANNEL"

          sudo apt-get install -y -q dpkg-dev

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          git worktree add /tmp/apt-repo gh-pages

          bash scripts/update-apt-repo.sh "$DEB" /tmp/apt-repo "$CHANNEL"

          cd /tmp/apt-repo
          git add .
          git diff --staged --quiet && { echo "No changes to APT repo"; exit 0; }
          git commit -m "chore: update APT repo ($CHANNEL) for $(basename $DEB)"
          git push --force origin gh-pages
