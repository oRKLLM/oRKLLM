name: CI

on:
  push:
    branches: [main, beta, alpha]
  pull_request:
    branches: [main, beta, alpha]

permissions:
  contents: read
  security-events: write  # for Trivy SARIF upload

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # Expose test count so the badge job can use it
    outputs:
      tests_passed: ${{ steps.results.outputs.passed }}
      tests_total:  ${{ steps.results.outputs.total }}


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Keycloak image tar
        id: kc-image-cache
        uses: actions/cache@v4
        with:
          path: /tmp/kc-image.tar
          key: keycloak-optimized-${{ hashFiles('e2e/Dockerfile.keycloak', 'e2e/keycloak-realm.json') }}

      - name: Build optimized Keycloak image
        if: steps.kc-image-cache.outputs.cache-hit != 'true'
        run: |
          docker build -t orkllm-keycloak-test:latest -f e2e/Dockerfile.keycloak e2e/
          docker save orkllm-keycloak-test:latest -o /tmp/kc-image.tar

      - name: Load cached Keycloak image
        if: steps.kc-image-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/kc-image.tar

      - name: Start Keycloak and configure nginx
        run: |
          # Start Keycloak with the pre-built optimized image — boots in ~5s
          docker compose -f docker-compose.test.yml up -d

          # Configure /etc/hosts + nginx (HTTP + HTTPS) → oRKLLM:18000
          echo "127.0.0.1 orkllm.fischerapps.com" | sudo tee -a /etc/hosts
          sudo apt-get install -y -q nginx

          # Self-signed cert for HTTPS (Keycloak accepts it for redirect URIs)
          sudo openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout /etc/ssl/private/orkllm-test.key \
            -out /etc/ssl/certs/orkllm-test.crt \
            -subj "/CN=orkllm.fischerapps.com"

          sudo tee /etc/nginx/sites-available/orkllm > /dev/null << 'NGINX'
          server {
            listen 80;
            listen 443 ssl;
            server_name orkllm.fischerapps.com;
            ssl_certificate     /etc/ssl/certs/orkllm-test.crt;
            ssl_certificate_key /etc/ssl/private/orkllm-test.key;
            location / {
              proxy_pass http://127.0.0.1:18000;
              proxy_set_header Host $host;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
            }
          }
          NGINX
          sudo ln -sf /etc/nginx/sites-available/orkllm /etc/nginx/sites-enabled/orkllm
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t && sudo systemctl start nginx

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for Keycloak to be healthy
        run: |
          for i in $(seq 1 45); do
            curl -sf http://localhost:8080/realms/orkllm/.well-known/openid-configuration > /dev/null 2>&1 \
              && echo "Keycloak ready after ${i}x2s" && break
            if [ $i -eq 45 ]; then
              echo "Keycloak container logs:"
              docker compose -f docker-compose.test.yml logs --tail=50 keycloak || true
              exit 1
            fi
            sleep 2
          done
          echo "Keycloak issuer: $(curl -sf http://localhost:8080/realms/orkllm/.well-known/openid-configuration | grep -o '"issuer":"[^"]*"')"

      - name: Run E2E tests
        id: playwright
        # Use reporter config to write JSON to file while printing github annotations.
        # PLAYWRIGHT_JSON_OUTPUT_NAME is the env var Playwright uses to set the JSON output path.
        run: npx playwright test --reporter=json,github
        env:
          CI: '1'
          PLAYWRIGHT_JSON_OUTPUT_NAME: /tmp/pw-results.json
          ORKLLM_TEST_ADMIN_USER: ${{ secrets.ORKLLM_TEST_ADMIN_USER }}
          ORKLLM_TEST_ADMIN_PASS: ${{ secrets.ORKLLM_TEST_ADMIN_PASS }}
          ORKLLM_TEST_OIDC_ISSUER: ${{ secrets.ORKLLM_TEST_OIDC_ISSUER }}
          ORKLLM_TEST_OIDC_CLIENT_ID: ${{ secrets.ORKLLM_TEST_OIDC_CLIENT_ID }}
          ORKLLM_TEST_SAML_METADATA_URL: ${{ secrets.ORKLLM_TEST_SAML_METADATA_URL }}
          ORKLLM_TEST_OIDC_USER: ${{ secrets.ORKLLM_TEST_OIDC_USER }}
          ORKLLM_TEST_OIDC_USER_PASS: ${{ secrets.ORKLLM_TEST_OIDC_USER_PASS }}
          ORKLLM_TEST_OIDC_ADMIN_USER: ${{ secrets.ORKLLM_TEST_OIDC_ADMIN_USER }}
          ORKLLM_TEST_OIDC_ADMIN_PASS: ${{ secrets.ORKLLM_TEST_OIDC_ADMIN_PASS }}
          ORKLLM_TEST_LIVE: ${{ vars.ORKLLM_TEST_LIVE }}
          ORKLLM_TEST_LIVE_URL: ${{ vars.ORKLLM_TEST_LIVE_URL }}
          # Keycloak CI container issuer URL for SSO integration tests
          ORKLLM_TEST_MOCK_OIDC_URL: http://localhost:8080/realms/orkllm
          # Redirect base: test server directly so state cookie domain matches
          ORKLLM_TEST_REDIRECT_BASE: http://127.0.0.1:18000

      - name: Parse test results
        id: results
        if: always()
        run: |
          if [ -f /tmp/pw-results.json ]; then
            PASSED=$(node -e "const s=JSON.parse(require('fs').readFileSync('/tmp/pw-results.json')).stats||{}; console.log(s.expected??s.passed??0)")
            TOTAL=$(node  -e "const s=JSON.parse(require('fs').readFileSync('/tmp/pw-results.json')).stats||{}; console.log(s.total??(s.expected??0)+(s.unexpected??0))")
          else
            PASSED=0; TOTAL=0
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL"   >> "$GITHUB_OUTPUT"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    outputs:
      vuln_count: ${{ steps.count.outputs.count }}
      vuln_color: ${{ steps.count.outputs.color }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # GitHub's native npm audit (fails on high/critical)
      - name: npm audit
        run: npm audit --audit-level=high --omit=dev

      - name: npm audit (frontend)
        run: cd frontend && npm audit --audit-level=high --omit=dev

      - name: License check (production dependencies)
        run: |
          npx --yes license-checker --production \
            --onlyAllow 'MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;Apache2;Apache 2.0;0BSD;Unlicense;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Python-2.0;BlueOak-1.0.0' \
            --excludePackages 'orkllm' \
            --summary

      - name: Get week number for Trivy DB cache key
        id: weekly
        run: echo "week=$(date +%Y-W%V)" >> "$GITHUB_OUTPUT"

      # Cache Trivy binary + vulnerability DB (refreshed weekly)
      - name: Cache Trivy DB
        uses: actions/cache@v4
        id: trivy-cache
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ steps.weekly.outputs.week }}
          restore-keys: trivy-db-${{ runner.os }}-

      # Trivy filesystem scan — catches CVEs in node_modules and source
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'          # report but don't fail the build
          ignore-unfixed: true
          cache-dir: ~/.cache/trivy
          skip-db-update: ${{ steps.trivy-cache.outputs.cache-hit == 'true' }}
          # node_modules/npm is the npm CLI pulled in by @semantic-release/npm (CI-only, never
          # shipped to production). Its bundled deps (picomatch, brace-expansion, ip-address)
          # cannot be patched via package.json overrides — they live inside npm's own nested
          # node_modules which npm's override mechanism cannot reach. Production server: 0 vulns.
          skip-dirs: 'node_modules/npm'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy

      - name: Count vulnerabilities from SARIF
        id: count
        if: always()
        run: |
          COUNT=$(node -e "
            try {
              const d = JSON.parse(require('fs').readFileSync('trivy-results.sarif','utf8'));
              console.log((d.runs?.[0]?.results??[]).length);
            } catch { console.log(0); }
          ")
          if [ "$COUNT" -eq 0 ]; then COLOR=brightgreen
          elif [ "$COUNT" -le 5 ]; then COLOR=yellow
          else COLOR=red
          fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"

  # Update shields.io endpoint badges in a gist (only on main, requires GIST_TOKEN secret)
  badges:
    name: Update Badges
    runs-on: ubuntu-latest
    needs: [test, scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Update dynamic badges in Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: 1da454f93b1363fff7f67f731e579a2f
          TESTS_PASSED: ${{ needs.test.outputs.tests_passed }}
          TESTS_TOTAL: ${{ needs.test.outputs.tests_total }}
          VULN_COUNT: ${{ needs.scan.outputs.vuln_count }}
          VULN_COLOR: ${{ needs.scan.outputs.vuln_color }}
        run: |
          [ -z "$GIST_TOKEN" ] && { echo "GIST_TOKEN not set — skipping badge update"; exit 0; }
          [ -z "$GIST_ID" ]    && { echo "GIST_ID not set — skipping badge update"; exit 0; }

          TEST_COLOR=brightgreen
          [ "$TESTS_PASSED" != "$TESTS_TOTAL" ] && TEST_COLOR=red

          node << 'EOF'
          const https = require('https');
          const badge = (label, message, color) =>
            JSON.stringify({ schemaVersion: 1, label, message, color });
          const files = {
            'orkllm-tests.json': {
              content: badge('tests',
                `${process.env.TESTS_PASSED}/${process.env.TESTS_TOTAL} passing`,
                process.env.TEST_COLOR || 'brightgreen')
            },
            'orkllm-vulns.json': {
              content: badge('vulnerabilities',
                `${process.env.VULN_COUNT} HIGH/CRIT`,
                process.env.VULN_COLOR)
            },
          };
          const payload = JSON.stringify({ files });
          const req = https.request(
            `https://api.github.com/gists/${process.env.GIST_ID}`,
            { method: 'PATCH', headers: {
              'Authorization': `token ${process.env.GIST_TOKEN}`,
              'Content-Type': 'application/json',
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'orkllm-ci',
              'Content-Length': Buffer.byteLength(payload),
            }},
            res => { console.log('Badge gist updated:', res.statusCode); res.resume(); }
          );
          req.on('error', e => { console.error(e); process.exit(1); });
          req.end(payload);
          EOF
