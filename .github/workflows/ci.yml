name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # for Trivy SARIF upload

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # Expose test count so the badge job can use it
    outputs:
      tests_passed: ${{ steps.results.outputs.passed }}
      tests_total:  ${{ steps.results.outputs.total }}


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Keycloak with test realm
        run: |
          # Start Keycloak in dev mode with our realm pre-loaded
          docker run -d --name keycloak \
            -p 8080:8080 \
            -e KEYCLOAK_ADMIN=admin \
            -e KEYCLOAK_ADMIN_PASSWORD=admin \
            -v "${{ github.workspace }}/e2e/keycloak-realm.json:/opt/keycloak/data/import/realm.json" \
            quay.io/keycloak/keycloak:26.6 \
            start-dev --import-realm

          echo "Waiting for Keycloak to start (up to 120s)..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/realms/master/.well-known/openid-configuration > /dev/null 2>&1 \
              && echo "Keycloak ready after ${i}x2s" && break
            sleep 2
          done

          # Confirm realm and client loaded
          curl -sf http://localhost:8080/realms/master/.well-known/openid-configuration \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('issuer:', d['issuer'])"

      - name: Configure /etc/hosts and nginx for SSO tests
        run: |
          # Map orkllm.fischerapps.com to localhost so OIDC redirect URI resolves
          echo "127.0.0.1 orkllm.fischerapps.com" | sudo tee -a /etc/hosts

          # nginx on port 80 → oRKLLM test server on 18000
          # Allows http://orkllm.fischerapps.com/auth/oidc/callback as redirect URI
          sudo apt-get install -y -q nginx
          sudo tee /etc/nginx/sites-available/orkllm > /dev/null << 'NGINX'
          server {
            listen 80;
            server_name orkllm.fischerapps.com;
            location / {
              proxy_pass http://127.0.0.1:18000;
              proxy_set_header Host $host;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
            }
          }
          NGINX
          sudo ln -sf /etc/nginx/sites-available/orkllm /etc/nginx/sites-enabled/orkllm
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t && sudo systemctl start nginx

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        id: playwright
        # Use reporter config to write JSON to file while printing github annotations.
        # PLAYWRIGHT_JSON_OUTPUT_NAME is the env var Playwright uses to set the JSON output path.
        run: npx playwright test --reporter=json,github
        env:
          CI: '1'
          PLAYWRIGHT_JSON_OUTPUT_NAME: /tmp/pw-results.json
          ORKLLM_TEST_ADMIN_USER: ${{ secrets.ORKLLM_TEST_ADMIN_USER }}
          ORKLLM_TEST_ADMIN_PASS: ${{ secrets.ORKLLM_TEST_ADMIN_PASS }}
          ORKLLM_TEST_OIDC_ISSUER: ${{ secrets.ORKLLM_TEST_OIDC_ISSUER }}
          ORKLLM_TEST_OIDC_CLIENT_ID: ${{ secrets.ORKLLM_TEST_OIDC_CLIENT_ID }}
          ORKLLM_TEST_SAML_METADATA_URL: ${{ secrets.ORKLLM_TEST_SAML_METADATA_URL }}
          ORKLLM_TEST_OIDC_USER: ${{ secrets.ORKLLM_TEST_OIDC_USER }}
          ORKLLM_TEST_OIDC_USER_PASS: ${{ secrets.ORKLLM_TEST_OIDC_USER_PASS }}
          ORKLLM_TEST_OIDC_ADMIN_USER: ${{ secrets.ORKLLM_TEST_OIDC_ADMIN_USER }}
          ORKLLM_TEST_OIDC_ADMIN_PASS: ${{ secrets.ORKLLM_TEST_OIDC_ADMIN_PASS }}
          ORKLLM_TEST_LIVE: ${{ vars.ORKLLM_TEST_LIVE }}
          ORKLLM_TEST_LIVE_URL: ${{ vars.ORKLLM_TEST_LIVE_URL }}
          # Keycloak test instance for SSO integration tests (started as Docker container)
          ORKLLM_TEST_MOCK_OIDC_URL: http://localhost:8080/realms/master

      - name: Parse test results
        id: results
        if: always()
        run: |
          if [ -f /tmp/pw-results.json ]; then
            PASSED=$(python3 -c "import json; d=json.load(open('/tmp/pw-results.json')); s=d.get('stats',{}); print(s.get('expected', s.get('passed', 0)))")
            TOTAL=$(python3  -c "import json; d=json.load(open('/tmp/pw-results.json')); s=d.get('stats',{}); print(s.get('total', s.get('expected',0) + s.get('unexpected',0)))")
          else
            PASSED=0; TOTAL=0
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL"   >> "$GITHUB_OUTPUT"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    outputs:
      vuln_count: ${{ steps.count.outputs.count }}
      vuln_color: ${{ steps.count.outputs.color }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # GitHub's native npm audit (fails on high/critical)
      - name: npm audit
        run: npm audit --audit-level=high --omit=dev

      - name: npm audit (frontend)
        run: cd frontend && npm audit --audit-level=high --omit=dev

      - name: Get week number for Trivy DB cache key
        id: weekly
        run: echo "week=$(date +%Y-W%V)" >> "$GITHUB_OUTPUT"

      # Cache Trivy binary + vulnerability DB (refreshed weekly)
      - name: Cache Trivy DB
        uses: actions/cache@v4
        id: trivy-cache
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ steps.weekly.outputs.week }}
          restore-keys: trivy-db-${{ runner.os }}-

      # Trivy filesystem scan — catches CVEs in node_modules and source
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'          # report but don't fail the build
          ignore-unfixed: true
          cache-dir: ~/.cache/trivy
          skip-db-update: ${{ steps.trivy-cache.outputs.cache-hit == 'true' }}

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy

      - name: Count vulnerabilities from SARIF
        id: count
        if: always()
        run: |
          COUNT=$(python3 -c "
          import json, sys
          try:
            d = json.load(open('trivy-results.sarif'))
            results = d.get('runs', [{}])[0].get('results', [])
            print(len(results))
          except:
            print(0)
          ")
          if [ "$COUNT" -eq 0 ]; then COLOR=brightgreen
          elif [ "$COUNT" -le 5 ]; then COLOR=yellow
          else COLOR=red
          fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"

  # Update shields.io endpoint badges in a gist (only on main, requires GIST_TOKEN secret)
  badges:
    name: Update Badges
    runs-on: ubuntu-latest
    needs: [test, scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Update dynamic badges in Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: 1da454f93b1363fff7f67f731e579a2f
          TESTS_PASSED: ${{ needs.test.outputs.tests_passed }}
          TESTS_TOTAL: ${{ needs.test.outputs.tests_total }}
          VULN_COUNT: ${{ needs.scan.outputs.vuln_count }}
          VULN_COLOR: ${{ needs.scan.outputs.vuln_color }}
        run: |
          [ -z "$GIST_TOKEN" ] && { echo "GIST_TOKEN not set — skipping badge update"; exit 0; }
          [ -z "$GIST_ID" ]    && { echo "GIST_ID not set — skipping badge update"; exit 0; }

          TEST_COLOR=brightgreen
          [ "$TESTS_PASSED" != "$TESTS_TOTAL" ] && TEST_COLOR=red

          python3 << 'EOF'
          import json, os, urllib.request

          def badge(label, message, color):
              return json.dumps({"schemaVersion":1,"label":label,"message":message,"color":color})

          files = {
            "orkllm-tests.json": {
              "content": badge("tests",
                f"{os.environ['TESTS_PASSED']}/{os.environ['TESTS_TOTAL']} passing",
                os.environ.get('TEST_COLOR','brightgreen'))
            },
            "orkllm-vulns.json": {
              "content": badge("vulnerabilities",
                f"{os.environ['VULN_COUNT']} HIGH/CRIT",
                os.environ['VULN_COLOR'])
            },
          }

          payload = json.dumps({"files": files}).encode()
          req = urllib.request.Request(
            f"https://api.github.com/gists/{os.environ['GIST_ID']}",
            data=payload, method="PATCH",
            headers={
              "Authorization": f"token {os.environ['GIST_TOKEN']}",
              "Content-Type": "application/json",
              "Accept": "application/vnd.github+json",
            }
          )
          with urllib.request.urlopen(req) as r:
            print("Badge gist updated:", r.status)
          EOF
